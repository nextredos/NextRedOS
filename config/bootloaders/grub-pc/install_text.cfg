submenu 'Installa NextRedOS (testuale) ...' --hotkey=t {
	source /boot/grub/theme.cfg
	menuentry 'Installa' --hotkey=i {
		linux	@KERNEL_DI@ vga=788 @APPEND_INSTALL@ --- quiet
		initrd	@INITRD_DI@
	}
	menuentry 'Installazione expert' --hotkey=x {
		linux	@KERNEL_DI@ priority=low vga=788 @APPEND_INSTALL@
		initrd	@INITRD_DI@
	}
	menuentry 'Installazione automatica' --hotkey=a {
		linux	@KERNEL_DI@ auto=true priority=critical vga=788 @APPEND_INSTALL@ --- quiet
		initrd	@INITRD_DI@
	}
	menuentry 'Modalita recovery' --hotkey=r {
		linux	@KERNEL_DI@ rescue/enable=true vga=788 @APPEND_INSTALL@ --- quiet
		initrd	@INITRD_DI@
	}
}
